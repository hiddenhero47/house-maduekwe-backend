<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Order Shipped</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      font-family: Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0">
      <tr>
        <td align="center">
          <table
            width="600"
            style="background: #ffffff; border-radius: 10px; padding: 30px"
          >
            <!-- HEADER -->
            <tr>
              <td align="center" style="padding-bottom: 20px">
                <img
                  src="https://housemaduekwe.com/app-logo.svg"
                  alt="House Maduekwe"
                  width="180"
                  style="display: block"
                />
              </td>
            </tr>

            <tr>
              <td>
                <h2 style="margin: 0; color: #000">
                  📦 Your Order Has Been Shipped
                </h2>

                <p style="color: #6f6f6f; font-size: 14px; margin-top: 8px">
                  Hi {{name}}, your order is now on its way.
                </p>
              </td>
            </tr>

            <tr>
              <td>
                <hr
                  style="
                    border: none;
                    border-top: 1px solid #eee;
                    margin: 20px 0;
                  "
                />
              </td>
            </tr>

            <!-- SHIPPING INFO -->

            <tr>
              <td style="font-size: 14px; color: #000">
                <p><strong>Order ID:</strong> {{orderId}}</p>

                <p>
                  <strong>Shipping Company:</strong>
                  {{company}}
                </p>

                <p>
                  <strong>Tracking Number:</strong>
                  {{trackingNumber}}
                </p>
              </td>
            </tr>

            <!-- CTA -->

            <tr>
              <td style="padding-top: 20px">
                <a
                  href="{{orderUrl}}"
                  style="
                    display: inline-block;
                    padding: 12px 18px;
                    background: #000;
                    color: #fff;
                    text-decoration: none;
                    border-radius: 8px;
                    font-size: 14px;
                  "
                >
                  Track Your Order
                </a>
              </td>
            </tr>

            <!-- FOOTER -->

            <tr>
              <td style="padding-top: 30px; color: #999; font-size: 12px">
                Thank you for shopping with House Maduekwe.
                <br /><br />
                © {{year}} House Maduekwe
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
